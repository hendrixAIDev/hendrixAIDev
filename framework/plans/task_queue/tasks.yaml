  - id: fpm-20260515-005
    created_at: '2026-05-15T22:58:00-07:00'
    updated_at: '2026-05-16T00:58:13-07:00'
    source: pm
    title: Make MVP 1 honest about stale, sparse, and approximate source state
    problem_statement: >-
      The current v1 source set mixes product state files, task queues, GitHub/precheck
      ticket state, and optional human-facing context, yet the planned UI still lacks a
      queued product task for showing provenance, refresh timing, and intentional empty
      states. If that transparency work is skipped, users may over-trust inferred role or
      stage output and misread sparse products as broken rather than intentionally under-
      detailed.
    expected_behavior: >-
      Framework should present source provenance, last-refresh context, and clear
      empty/approximate-state messaging anywhere MVP 1 displays inferred board-review data,
      so JJ can tell what is live GitHub truth, what is cached/local state, what is
      approximate, and what simply has no deeper detail yet.
    priority: medium
    status: done
    github_issue: hendrixAIDev/hendrixAIDev#34
    attempt_count: 1
    evidence:
      - type: doc
        ref: framework/board-review/state/README.md
        note: >-
          Product state files, precheck state, task queues, and GitHub labels each have
          different authority boundaries, so the UI needs explicit framing to avoid
          overstating confidence.
      - type: doc
        ref: framework/plans/org-view-mvp1-implementation-backlog-2026-05-15.md
        note: >-
          Backlog item 5 calls for source-state transparency, last-refresh context, and
          graceful handling of empty or approximate product states before MVP 1 is trusted.
      - type: doc
        ref: framework/board-review/state/framework.md
        note: >-
          The live Framework state already tracks dispatch timing and recent result text,
          which highlights the broader trust question of how stale or partial state should
          be represented to users in a read-only operations view.
    pm_notes:
      - >-
        Treat this as a user-trust task, not polish. The first release should be explicit
        about what it knows and what it is inferring from cached or local source state.
    cto_notes:
