  - id: fpm-20260510-001
    created_at: '2026-05-10T14:56:00-07:00'
    updated_at: '2026-05-15T16:01:33-07:00'
    source: pm
    title: Decompose the org summary plus ChurnPilot pilot view into an MVP 1 implementation backlog
    problem_statement: >-
      The org-view proposal now defines a clear MVP 1 shape, but JJ and CTO still do not
      have a concrete implementation backlog for the read-only first release. Without a
      PM follow-up that breaks the MVP into ordered execution tasks, the team risks scope
      creep, ambiguous ownership, and accidentally pulling later analytics/retry concerns
      into a v1 that should stay clean and focused.
    expected_behavior: >-
      The Framework PM should turn MVP 1 into a concrete backlog of 3-7 actionable
      implementation tasks for the ChurnPilot pilot. The follow-up should recommend
      execution order and dependencies, stay implementation-agnostic where appropriate,
      and keep scope anchored to an org-wide summary plus one ChurnPilot detail page that
      shows all active roles, reads from product state, queue state, and GitHub
      issue/status-label state first, and remains read-only without retry/stall
      analytics in v1.
    priority: high
    status: done
    github_issue: hendrixAIDev/hendrixAIDev#28
    attempt_count: 0
    evidence:
      - type: doc
        ref: framework/plans/org-view-visualization.md
        note: >-
          The updated org-view plan recommends MVP 1 as a read-only JJ-facing org summary
          above a single ChurnPilot detail page, with all active role chips visible and
          product state, queue state, and GitHub issue/status-label state as the initial
          source of truth.
      - type: doc
        ref: framework/board-review/state/README.md
        note: >-
          Per-product board-review state files provide durable product identity, CTO
          handoff notes, active dispatch pointers, and recent product-level result text,
          while GitHub labels remain authoritative for ticket actionability.
      - type: doc
        ref: framework/plans/task_queue/tasks.yaml
        note: >-
          Queue item fpm-20260509-001 captured the discovery/spec step, but there is not
          yet a follow-up PM backlog-decomposition item that translates MVP 1 into
          ordered implementation work.
    pm_notes:
      - Discovery/planning only. Do not create GitHub issues, dispatch engineering, or mutate production workflow state from this follow-up.
      - Produce 3-7 actionable implementation tasks for MVP 1, with recommended execution order and explicit dependencies where they matter.
      - Keep the framing implementation-agnostic where possible, but make each backlog task concrete enough for CTO intake.
      - Preserve the v1 product direction from the org-view plan: JJ-first audience, org-wide summary first, one ChurnPilot detail page, all active roles visible, product state plus queue and GitHub issue/status-label state as the initial source of truth, read-only interaction, and no retry/stall analytics yet.
    cto_notes:
      - '2026-05-15 16:01 PDT - Promoted to GitHub as Framework #28 after verifying this proposed framework backlog item had been repeatedly surfaced by precheck but not consumed by the Framework CTO queue-intake path. Linked the queue item, preserved the PM framing, and added acceptance tests plus v1 scope constraints in the ticket body.'
      - '2026-05-15 22:40 PDT - CTO accepted the completed PM backlog artifact, closed Framework #28 as done, and promoted the first dependency into Framework #29 for a field-level MVP 1 view contract dispatch.'
