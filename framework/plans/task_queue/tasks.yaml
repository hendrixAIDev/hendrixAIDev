    title: Stabilize the MVP 1 product-state/queue/ticket model into a documented view-model mapping
    problem_statement: >-
      The org-view concept and backlog now define what the first release should show, but
      the current framework docs still do not spell out how fields from per-product state
      files, product task queues, and GitHub issue/status-label state become stable
      product-facing data for the org summary and ChurnPilot pilot page. Without that
      mapping, engineers will have to infer semantics from scattered operational sources,
      which risks inconsistent role-chip behavior, stage drift, and a UI that overstates
      source precision.
    expected_behavior: >-
      Framework should define a documented translation layer from product state, queue
      state, and GitHub issue/status-label state into the MVP 1 display model so every
      visible field has a named source, fallback behavior, and an explicit note when the
      output is approximate, cached, or inferred rather than authoritative live
      orchestration state.
    priority: high
    status: done
    github_issue: hendrixAIDev/hendrixAIDev#30
    attempt_count: 0
    evidence:
      - type: ticket
        ref: hendrixAIDev/hendrixAIDev#29
        note: >-
          Framework #29 is already handling the field-level contract, so this follow-on
          task should focus on the source-to-view-model mapping rather than duplicating
          the scope lock.
      - type: doc
        ref: framework/plans/org-view-mvp1-implementation-backlog-2026-05-15.md
        note: >-
          Backlog item 2 calls for a documented mapping from product state, queue state,
          and GitHub issue/status-label state into the org summary and ChurnPilot detail
          display model, including role-state inference and normalized work-stage grouping.
      - type: doc
        ref: framework/board-review/state/README.md
        note: >-
          Product state files are durable CTO continuity artifacts while GitHub labels
          decide ticket actionability, so the UI needs a documented adapter instead of
          treating the fleet status snapshot as backing data.
    pm_notes:
      - >-
        This is the first follow-on item after the active MVP 1 contract ticket. Keep the
        task implementation-agnostic and focused on making the source semantics honest and
        stable for the v1 UI.
    cto_notes:
      - '2026-05-15 22:49 PDT - CTO accepted Framework #29 view contract, promoted this mapping task to Framework #30, and dispatched eng-fw30-view-model-mapping-r1.'
      - '2026-05-15 23:04 PDT - CTO accepted the corrected view-model mapping artifact, closed Framework #30 as done, and promoted the next dependency into Framework #31 for org-summary UI implementation.'
    last_cto_reviewed_at: '2026-05-15T23:04:37-07:00'

